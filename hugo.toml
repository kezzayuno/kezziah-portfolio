baseURL = "https://kezzayuno.github.io/kezziah-portfolio/"
locale = "en-US"
title = "kezziah's portfolio"

[params]
  background = "/images/site/background.png"

[params.logo]
  favicon = "images/site/favicon.png"

[params.topNavbar]
  maxVisibleSections = 5

[module]
  [[module.imports]]
    path = "github.com/hugo-toha/toha/v4"

  [[module.mounts]]
    source = "archetypes"
    target = "archetypes"

  [[module.mounts]]
    source = "assets"
    target = "assets"

  [[module.mounts]]
    source = "content"
    target = "content"

  [[module.mounts]]
    source = "data"
    target = "data"

  [[module.mounts]]
    source = "layouts"
    target = "layouts"

  [[module.mounts]]
    source = "static"
    target = "static"